request:
  auth: inherit

docs: |-
  User-scoped supplier management.
  Each user manages their own suppliers (filtered by created_by).
  Fields: name, company, category, email, phone, image.
  Can be assigned to projects via ProjectSupplier pivot.
  Supplier must belong to authenticated user before project assignment.
