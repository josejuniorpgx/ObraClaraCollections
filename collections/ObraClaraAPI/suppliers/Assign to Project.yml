info:
  name: Assign to Project
  type: http
  seq: 4
  tags:
  - suppliers
http:
  method: POST
  url: '{{baseUrl}}/api/v1/projects/:project_pk/suppliers/'
  params:
  - name: project_pk
    value: ''
    type: path
  body:
    type: json
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
examples:
- name: 201 Response
  request:
    url: '{{baseUrl}}/api/v1/projects/:project_pk/suppliers/'
    method: POST
    params:
    - name: project_pk
      value: ''
      type: path
    body:
      type: json
      data: |-
        {
          "supplier_id": ""
        }
  response:
    status: 201
    statusText: Created
    headers:
    - name: Content-Type
      value: application/json
    body:
      type: json
      data: |-
        {
          "supplier_id": ""
        }
docs: List or assign suppliers to a project.
script:
  tests: |-
    test("Status is 201", function() {
      expect(res.getStatus()).to.equal(201);
    });

    test("Response has id", function() {
      const body = res.getBody();
      expect(body.id).to.be.a("string");
    });
