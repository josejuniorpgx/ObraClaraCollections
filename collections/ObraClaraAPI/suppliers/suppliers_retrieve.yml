http:
  method: GET
  url: "{{baseUrl}}/api/v1/suppliers/:id/"
  params:
    - name: id
      value: ""
      type: path
      description: Un Cadena UUID que identifique este supplier.
  auth:
    type: bearer
    token: "{{token}}"

settings:
