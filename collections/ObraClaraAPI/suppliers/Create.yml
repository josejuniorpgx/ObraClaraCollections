info:
  name: Create
  type: http
  seq: 3
  tags:
  - suppliers
http:
  method: POST
  url: '{{baseUrl}}/api/v1/suppliers/'
  body:
    type: json
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
examples:
- name: 201 Response
  request:
    url: '{{baseUrl}}/api/v1/suppliers/'
    method: POST
    body:
      type: json
      data: |-
        {
          "name": "",
          "company": "",
          "category": "",
          "email": "",
          "phone": "",
          "image": ""
        }
  response:
    status: 201
    statusText: Created
    headers:
    - name: Content-Type
      value: application/json
    body:
      type: json
      data: |-
        {
          "name": "",
          "company": "",
          "category": "",
          "email": "",
          "phone": "",
          "image": ""
        }
docs: CRUD for suppliers scoped to the authenticated user.
script:
  post-response: |-
    const body = res.getBody();
    if (body.id) {
      bru.setEnvVar("supplier_id", body.id);
    }
  tests: |-
    test("Status is 201", function() {
      expect(res.getStatus()).to.equal(201);
    });

    test("Response has id", function() {
      const body = res.getBody();
      expect(body.id).to.be.a("string");
    });
