info:
  name: Register
  type: http
  seq: 2
  tags:
  - auth
http:
  method: POST
  url: '{{baseUrl}}/api/v1/auth/register/'
  body:
    type: json
  auth: none
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
examples:
- name: 201 Response
  request:
    url: '{{baseUrl}}/api/v1/auth/register/'
    method: POST
    body:
      type: json
      data: |-
        {
          "email": "",
          "password1": "",
          "password2": "",
          "first_name": "",
          "last_name": ""
        }
  response:
    status: 201
    statusText: Created
    headers:
    - name: Content-Type
      value: application/json
    body:
      type: json
      data: |-
        {
          "access": "",
          "refresh": "",
          "user": {
            "id": "",
            "email": "",
            "username": "",
            "first_name": "",
            "last_name": "",
            "phone_number": "",
            "profile_image": "",
            "date_of_birth": "",
            "role": "",
            "created": ""
          }
        }
docs: |-
  Registers a new user.

  Accepts the following POST parameters: username, email, password1, password2.
