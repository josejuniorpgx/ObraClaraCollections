info:
  name: Get Profile
  type: http
  seq: 8
  tags:
  - auth
http:
  method: GET
  url: '{{baseUrl}}/api/v1/auth/me/'
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
examples:
- name: 200 Response
  request:
    url: '{{baseUrl}}/api/v1/auth/me/'
    method: GET
  response:
    status: 200
    statusText: OK
    headers:
    - name: Content-Type
      value: application/json
    body:
      type: json
      data: |-
        {
          "id": "",
          "email": "",
          "username": "",
          "first_name": "",
          "last_name": "",
          "phone_number": "",
          "profile_image": "",
          "date_of_birth": "",
          "role": "",
          "created": ""
        }
script:
  tests: |-
    test("Status is 200", function() {
      expect(res.getStatus()).to.equal(200);
    });

    test("Response is JSON", function() {
      const contentType = res.getHeader("Content-Type");
      expect(contentType).to.contain("application/json");
    });
