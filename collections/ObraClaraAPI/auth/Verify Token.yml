info:
  name: Verify Token
  type: http
  seq: 5
  tags:
  - auth
http:
  method: POST
  url: '{{baseUrl}}/api/v1/auth/token/verify/'
  body:
    type: json
  auth: none
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
examples:
- name: 200 Response
  description: No response body
  request:
    url: '{{baseUrl}}/api/v1/auth/token/verify/'
    method: POST
    body:
      type: json
      data: |-
        {
          "token": ""
        }
  response:
    status: 200
    statusText: OK
    body:
      type: text
      data: ''
docs: |-
  Takes a token and indicates if it is valid.  This view provides no
  information about a token's fitness for a particular use.
