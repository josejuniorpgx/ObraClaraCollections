info:
  name: auth_token_refresh_create
  type: http
  seq: 10
  tags:
    - auth

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/token/refresh/"
  body:
    type: json
    data: |-
      {
        "refresh": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/v1/auth/token/refresh/"
      method: POST
      body:
        type: json
        data: |-
          {
            "refresh": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "access": "",
            "refresh": ""
          }

docs: |-
  Takes a refresh type JSON web token and returns an access type JSON web
  token if the refresh token is valid.
