info:
  name: Patch User
  type: http
  seq: 7
  tags:
  - auth
http:
  method: PATCH
  url: '{{baseUrl}}/api/v1/auth/user/'
  body:
    type: json
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
examples:
- name: 200 Response
  request:
    url: '{{baseUrl}}/api/v1/auth/user/'
    method: PATCH
    body:
      type: json
      data: |-
        {
          "first_name": "",
          "last_name": "",
          "phone_number": "",
          "profile_image": "",
          "date_of_birth": ""
        }
  response:
    status: 200
    statusText: OK
    headers:
    - name: Content-Type
      value: application/json
    body:
      type: json
      data: |-
        {
          "id": "",
          "email": "",
          "username": "",
          "first_name": "",
          "last_name": "",
          "phone_number": "",
          "profile_image": "",
          "date_of_birth": "",
          "role": "",
          "created": ""
        }
docs: |-
  Reads and updates UserModel fields
  Accepts GET, PUT, PATCH methods.

  Default accepted fields: username, first_name, last_name
  Default display fields: pk, username, email, first_name, last_name
  Read-only fields: pk, email

  Returns UserModel fields.
