info:
  name: Get
  type: http
  seq: 6
  tags:
    - report-configurations

http:
  method: GET
  url: "{{baseUrl}}/api/v1/projects/:project_pk/report-configurations/:id/"
  params:
    - name: project_pk
      value: "{{project_pk}}"
      type: path
    - name: id
      value: "{{report_configuration_id}}"
      type: path
      description: UUID de la configuración.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/v1/projects/:project_pk/report-configurations/:id/"
      method: GET
      params:
        - name: project_pk
          value: ""
          type: path
        - name: id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "project": "",
            "frequency_days": 7,
            "is_active": true,
            "last_run": null,
            "next_run": "",
            "sections_config": {},
            "created": "",
            "modified": ""
          }

docs: |-
  Retrieve a report configuration by ID.
  OWNER only.
script:
  tests: |-
    test("Status is 200", function() {
      expect(res.getStatus()).to.equal(200);
    });

    test("Response is JSON", function() {
      const contentType = res.getHeader("Content-Type");
      expect(contentType).to.contain("application/json");
    });
