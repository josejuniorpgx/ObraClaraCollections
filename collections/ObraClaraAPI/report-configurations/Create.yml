info:
  name: Create
  type: http
  seq: 5
  tags:
    - report-configurations

http:
  method: POST
  url: "{{baseUrl}}/api/v1/projects/:project_pk/report-configurations/"
  params:
    - name: project_pk
      value: "{{project_pk}}"
      type: path
  body:
    type: json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    request:
      url: "{{baseUrl}}/api/v1/projects/:project_pk/report-configurations/"
      method: POST
      params:
        - name: project_pk
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "frequency_days": 7,
            "is_active": true,
            "sections_config": {}
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "project": "",
            "frequency_days": 7,
            "is_active": true,
            "last_run": null,
            "next_run": "",
            "sections_config": {},
            "created": "",
            "modified": ""
          }

docs: |-
  Create a report configuration for a project (OneToOne).
  OWNER only. frequency_days defaults to 7 and drives next_run auto-calculation.
script:
  post-response: |-
    const body = res.getBody();
    if (body.id) {
      bru.setEnvVar("report_configuration_id", body.id);
    }
  tests: |-
    test("Status is 201", function() {
      expect(res.getStatus()).to.equal(201);
    });

    test("Response has id", function() {
      const body = res.getBody();
      expect(body.id).to.be.a("string");
    });
