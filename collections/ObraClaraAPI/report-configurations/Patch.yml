info:
  name: Patch
  type: http
  seq: 8
  tags:
    - report-configurations

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/projects/:project_pk/report-configurations/:id/"
  params:
    - name: project_pk
      value: "{{project_pk}}"
      type: path
    - name: id
      value: "{{report_configuration_id}}"
      type: path
      description: UUID de la configuración.
  body:
    type: json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/v1/projects/:project_pk/report-configurations/:id/"
      method: PATCH
      params:
        - name: project_pk
          value: ""
          type: path
        - name: id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "frequency_days": 14,
            "is_active": true,
            "sections_config": {}
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "project": "",
            "frequency_days": 14,
            "is_active": true,
            "last_run": null,
            "next_run": "",
            "sections_config": {},
            "created": "",
            "modified": ""
          }

docs: |-
  Partially update a report configuration.
  OWNER only. Changing frequency_days recalculates next_run from last_run.
script:
  tests: |-
    test("Status is 200", function() {
      expect(res.getStatus()).to.equal(200);
    });
