info:
  name: List
  type: http
  seq: 3
  tags:
    - report-configurations

http:
  method: GET
  url: "{{baseUrl}}/api/v1/projects/:project_pk/report-configurations/"
  params:
    - name: project_pk
      value: "{{project_pk}}"
      type: path
    - name: ordering
      value: ""
      type: query
      description: Qué campo usar para ordenar los resultados.
      disabled: true
    - name: page
      value: ""
      type: query
      description: Un número de página dentro del conjunto de resultados paginado.
      disabled: true
    - name: page_size
      value: ""
      type: query
      description: Número de resultados a devolver por página.
      disabled: true
    - name: search
      value: ""
      type: query
      description: Un término de búsqueda.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/v1/projects/:project_pk/report-configurations/"
      method: GET
      params:
        - name: project_pk
          value: ""
          type: path
        - name: ordering
          value: ""
          type: query
          disabled: true
        - name: page
          value: ""
          type: query
          disabled: true
        - name: page_size
          value: ""
          type: query
          disabled: true
        - name: search
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "count": 0,
            "next": null,
            "previous": null,
            "results": [
              {
                "id": "",
                "project": "",
                "frequency_days": 7,
                "is_active": true,
                "last_run": null,
                "next_run": "",
                "sections_config": {},
                "created": "",
                "modified": ""
              }
            ]
          }

docs: |-
  List report configurations for a project (0 or 1 result).
  OWNER only.
script:
  tests: |-
    test("Status is 200", function() {
      expect(res.getStatus()).to.equal(200);
    });

    test("Response is JSON", function() {
      const contentType = res.getHeader("Content-Type");
      expect(contentType).to.contain("application/json");
    });
