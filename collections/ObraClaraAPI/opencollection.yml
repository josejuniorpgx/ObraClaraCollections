opencollection: 1.0.0

info:
  name: ObraClaraAPI
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: bearer
    token: "{{token}}"
script:
  pre-request: |-
    const token = bru.getEnvVar("token");
    if (token) {
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const exp = payload.exp * 1000;
        const now = Date.now();
        const margin = 30 * 1000;
        if (exp - now < margin) {
          const refreshToken = bru.getEnvVar("refresh_token");
          if (refreshToken) {
            const baseUrl = bru.getEnvVar("baseUrl");
            const res = await fetch(baseUrl + "/api/v1/auth/token/refresh/", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ refresh: refreshToken })
            });
            if (res.ok) {
              const data = await res.json();
              if (data.access) bru.setEnvVar("token", data.access);
              if (data.refresh) bru.setEnvVar("refresh_token", data.refresh);
            }
          }
        }
      } catch (e) {}
    }
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
