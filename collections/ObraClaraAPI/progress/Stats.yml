info:
  name: Stats
  type: http
  seq: 8
  tags:
  - progress
http:
  method: GET
  url: '{{baseUrl}}/api/v1/progress/stats/'
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
examples:
- name: 200 Response
  description: No response body
  request:
    url: '{{baseUrl}}/api/v1/progress/stats/'
    method: GET
  response:
    status: 200
    statusText: OK
    body:
      type: text
      data: ''
docs: |-
  Summary stats for progress entries across all user projects.
  Returns total, completed, and in-progress entry counts.
  A stage is "completed" when its base percentage + entry deltas >= 100.
  Entries without a stage are counted as in-progress.
  Respects visible_to_client for VIEWER/CLIENT roles.
