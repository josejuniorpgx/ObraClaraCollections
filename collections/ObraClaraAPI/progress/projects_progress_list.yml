info:
  name: projects_progress_list
  type: http
  seq: 1
  tags:
    - progress

http:
  method: GET
  url: "{{baseUrl}}/api/v1/projects/:project_pk/progress/"
  params:
    - name: ordering
      value: ""
      type: query
      description: Qué campo usar para ordenar los resultados.
      disabled: true
    - name: page
      value: ""
      type: query
      description: Un número de página dentro del conjunto de resultados paginado.
      disabled: true
    - name: page_size
      value: ""
      type: query
      description: Número de resultados a devolver por página.
      disabled: true
    - name: project_pk
      value: ""
      type: path
    - name: search
      value: ""
      type: query
      description: Un término de búsqueda.
      disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

