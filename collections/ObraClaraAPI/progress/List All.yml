info:
  name: List All
  type: http
  seq: 1
  tags:
  - progress
http:
  method: GET
  url: '{{baseUrl}}/api/v1/progress/'
  params:
  - name: ordering
    value: ''
    type: query
    description: Qué campo usar para ordenar los resultados.
    disabled: true
  - name: page
    value: ''
    type: query
    description: Un número de página dentro del conjunto de resultados paginado.
    disabled: true
  - name: page_size
    value: ''
    type: query
    description: Número de resultados a devolver por página.
    disabled: true
  - name: search
    value: ''
    type: query
    description: Un término de búsqueda.
    disabled: true
  - name: project
    value: ''
    type: query
    description: Filtrar por proyecto (UUID).
    disabled: true
  - name: stage
    value: ''
    type: query
    description: Filtrar por etapa (UUID).
    disabled: true
  - name: date_from
    value: ''
    type: query
    description: Fecha mínima (YYYY-MM-DD).
    disabled: true
  - name: date_to
    value: ''
    type: query
    description: Fecha máxima (YYYY-MM-DD).
    disabled: true
  - name: visible_to_client
    value: ''
    type: query
    description: Filtrar por visibilidad al cliente (true/false).
    disabled: true
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
examples:
- name: 200 Response
  request:
    url: '{{baseUrl}}/api/v1/progress/'
    method: GET
    params:
    - name: ordering
      value: ''
      type: query
      disabled: true
    - name: page
      value: ''
      type: query
      disabled: true
    - name: page_size
      value: ''
      type: query
      disabled: true
    - name: search
      value: ''
      type: query
      disabled: true
    - name: project
      value: ''
      type: query
      disabled: true
    - name: stage
      value: ''
      type: query
      disabled: true
    - name: date_from
      value: ''
      type: query
      disabled: true
    - name: date_to
      value: ''
      type: query
      disabled: true
    - name: visible_to_client
      value: ''
      type: query
      disabled: true
  response:
    status: 200
    statusText: OK
    headers:
    - name: Content-Type
      value: application/json
    body:
      type: json
      data: |-
        {
          "count": 123,
          "next": "http://api.example.org/accounts/?page=4",
          "previous": "http://api.example.org/accounts/?page=2",
          "results": [
            {
              "id": "",
              "project": "",
              "stage": "",
              "description": "",
              "date": "",
              "percentage_delta": "",
              "visible_to_client": false,
              "accumulated_progress": "",
              "created_by": "",
              "created": ""
            }
          ]
        }
docs: List all progress entries across projects where the user participates.
script:
  tests: |-
    test("Status is 200", function() {
      expect(res.getStatus()).to.equal(200);
    });

    test("Response is JSON", function() {
      const contentType = res.getHeader("Content-Type");
      expect(contentType).to.contain("application/json");
    });
