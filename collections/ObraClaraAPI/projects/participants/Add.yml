info:
  name: Add
  type: http
  seq: 2
  tags:
  - projects
http:
  method: POST
  url: '{{baseUrl}}/api/v1/projects/:project_pk/participants/'
  params:
  - name: project_pk
    value: ''
    type: path
  body:
    type: json
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
examples:
- name: 201 Response
  request:
    url: '{{baseUrl}}/api/v1/projects/:project_pk/participants/'
    method: POST
    params:
    - name: project_pk
      value: ''
      type: path
    body:
      type: json
      data: |-
        {
          "email": "",
          "role": "owner",
          "job_title": ""
        }
  response:
    status: 201
    statusText: Created
    headers:
    - name: Content-Type
      value: application/json
    body:
      type: json
      data: |-
        {
          "email": "",
          "role": "owner",
          "job_title": ""
        }
docs: List active participants or invite a new one.
script:
  post-response: |-
    const body = res.getBody();
    if (body.id) {
      bru.setEnvVar("participant_id", body.id);
    }
  tests: |-
    test("Status is 201", function() {
      expect(res.getStatus()).to.equal(201);
    });

    test("Response has id", function() {
      const body = res.getBody();
      expect(body.id).to.be.a("string");
    });
