info:
  name: List
  type: http
  seq: 1
  tags:
    - projects

http:
  method: GET
  url: "{{baseUrl}}/api/v1/projects/"
  params:
    - name: ordering
      value: ""
      type: query
      description: Qué campo usar para ordenar los resultados.
      disabled: true
    - name: page
      value: ""
      type: query
      description: Un número de página dentro del conjunto de resultados paginado.
      disabled: true
    - name: page_size
      value: ""
      type: query
      description: Número de resultados a devolver por página.
      disabled: true
    - name: search
      value: ""
      type: query
      description: Un término de búsqueda.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/v1/projects/"
      method: GET
      params:
        - name: ordering
          value: ""
          type: query
          description: Qué campo usar para ordenar los resultados.
          disabled: true
        - name: page
          value: ""
          type: query
          description: Un número de página dentro del conjunto de resultados paginado.
          disabled: true
        - name: page_size
          value: ""
          type: query
          description: Número de resultados a devolver por página.
          disabled: true
        - name: search
          value: ""
          type: query
          description: Un término de búsqueda.
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "count": 123,
            "next": "http://api.example.org/accounts/?page=4",
            "previous": "http://api.example.org/accounts/?page=2",
            "results": [
              {
                "id": "",
                "name": "",
                "project_type": "construction",
                "image": "",
                "location": "",
                "start_date": "",
                "end_date": "",
                "created": "",
                "modified": "",
                "user_role": "",
                "participants_count": 0,
                "participants_preview": "",
                "progress_percentage": ""
              }
            ]
          }

