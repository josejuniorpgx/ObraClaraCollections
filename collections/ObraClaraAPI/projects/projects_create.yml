info:
  name: projects_create
  type: http
  seq: 2
  tags:
    - projects

http:
  method: POST
  url: "{{baseUrl}}/api/v1/projects/"
  body:
    type: json
    data: |-
      {
        "name": "",
        "project_type": "construction",
        "image": "",
        "location": "",
        "budget_estimated": "",
        "start_date": "",
        "end_date": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
