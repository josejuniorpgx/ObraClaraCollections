http:
  method: GET
  url: '{{baseUrl}}/api/v1/projects/:project_pk/reports/:id/'
  params:
  - name: project_pk
    value: ''
    type: path
  - name: id
    value: ''
    type: path
    description: UUID del report.
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
examples:
- name: 200 Response
  request:
    url: '{{baseUrl}}/api/v1/projects/:project_pk/reports/:id/'
    method: GET
    params:
    - name: project_pk
      value: ''
      type: path
    - name: id
      value: ''
      type: path
  response:
    status: 200
    statusText: OK
    headers:
    - name: Content-Type
      value: application/json
    body:
      type: json
      data: |-
        {
          "id": "",
          "title": "",
          "period_start": "",
          "period_end": "",
          "data_snapshot": {
            "project": {},
            "team": [],
            "kpis": {},
            "progress_entries": [],
            "expenses": {},
            "incidents": []
          },
          "status": "draft",
          "visible_to_client": true,
          "generated_by": {
            "id": "",
