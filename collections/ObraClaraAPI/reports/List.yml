info:
  name: List
  type: http
  seq: 3
  tags:
  - reports
http:
  method: GET
  url: '{{baseUrl}}/api/v1/projects/:project_pk/reports/'
  params:
  - name: project_pk
    value: ''
    type: path
  - name: ordering
    value: ''
    type: query
    description: Qué campo usar para ordenar los resultados.
    disabled: true
  - name: page
    value: ''
    type: query
    description: Un número de página dentro del conjunto de resultados paginado.
    disabled: true
  - name: page_size
    value: ''
    type: query
    description: Número de resultados a devolver por página.
    disabled: true
  - name: search
    value: ''
    type: query
    description: Un término de búsqueda.
    disabled: true
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
examples:
- name: 200 Response
  request:
    url: '{{baseUrl}}/api/v1/projects/:project_pk/reports/'
    method: GET
    params:
    - name: project_pk
      value: ''
      type: path
    - name: ordering
      value: ''
      type: query
      disabled: true
    - name: page
      value: ''
      type: query
      disabled: true
    - name: page_size
      value: ''
      type: query
      disabled: true
    - name: search
      value: ''
      type: query
      disabled: true
  response:
    status: 200
    statusText: OK
    headers:
    - name: Content-Type
      value: application/json
    body:
      type: json
      data: |-
        {
          "count": 0,
          "next": null,
          "previous": null,
          "results": [
            {
              "id": "",
              "title": "",
              "period_start": "",
              "period_end": "",
              "status": "draft",
              "visible_to_client": true,
              "generated_by": {
                "id": "",
                "email": "",
                "first_name": "",
                "last_name": "",
                "profile_image": null
              },
              "published_at": null,
              "created": ""
            }
          ]
        }
docs: |-
  List reports for a project.
  VIEWER/CLIENT only see published reports. OWNER and COLLABORATOR see all.
script:
  tests: |-
    test("Status is 200", function() {
      expect(res.getStatus()).to.equal(200);
    });

    test("Response is JSON", function() {
      const contentType = res.getHeader("Content-Type");
      expect(contentType).to.contain("application/json");
    });
