info:
  name: Patch
  type: http
  seq: 8
  tags:
    - reports

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/projects/:project_pk/reports/:id/"
  params:
    - name: project_pk
      value: "{{project_pk}}"
      type: path
    - name: id
      value: "{{report_id}}"
      type: path
      description: UUID del report.
  body:
    type: json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/v1/projects/:project_pk/reports/:id/"
      method: PATCH
      params:
        - name: project_pk
          value: ""
          type: path
        - name: id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "title": "",
            "visible_to_client": true,
            "status": "published"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "title": "",
            "period_start": "",
            "period_end": "",
            "data_snapshot": {},
            "status": "published",
            "visible_to_client": true,
            "generated_by": {
              "id": "",
              "email": "",
              "first_name": "",
              "last_name": "",
              "profile_image": null
            },
            "published_at": "",
            "pdf_file": "",
            "created": "",
            "modified": ""
          }

docs: |-
  Update a draft report (title, visibility, status).
  OWNER only. Only draft reports can be modified. Set status to "published" to publish (triggers PDF generation and sets published_at).
script:
  tests: |-
    test("Status is 200", function() {
      expect(res.getStatus()).to.equal(200);
    });
