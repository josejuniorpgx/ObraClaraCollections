info:
  name: Create
  type: http
  seq: 2
  tags:
  - incidents
http:
  method: POST
  url: '{{baseUrl}}/api/v1/projects/:project_pk/incidents/:incident_pk/follow-ups/'
  params:
  - name: incident_pk
    value: ''
    type: path
  - name: project_pk
    value: ''
    type: path
  body:
    type: json
  auth: inherit
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
examples:
- name: 201 Response
  request:
    url: '{{baseUrl}}/api/v1/projects/:project_pk/incidents/:incident_pk/follow-ups/'
    method: POST
    params:
    - name: incident_pk
      value: ''
      type: path
    - name: project_pk
      value: ''
      type: path
    body:
      type: json
      data: |-
        {
          "comment": "",
          "status": "",
          "visible_to_client": false
        }
  response:
    status: 201
    statusText: Created
    headers:
    - name: Content-Type
      value: application/json
    body:
      type: json
      data: |-
        {
          "id": "",
          "comment": "",
          "status": "",
          "visible_to_client": false
        }
docs: List and create follow-ups for an incident.
script:
  tests: |-
    test("Status is 201", function() {
      expect(res.getStatus()).to.equal(201);
    });

    test("Response has id", function() {
      const body = res.getBody();
      expect(body.id).to.be.a("string");
    });
