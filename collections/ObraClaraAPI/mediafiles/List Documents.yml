docs: |-
  List project-level documents (blueprints, insurance, permits, etc.).
  Returns only files that are NOT attached to any entity
  (progress_entry, expense, incident, incident_followup are all null).
  These are direct project documents, not evidence from other modules.
  Permissions:
      - Any active project participant can list.
