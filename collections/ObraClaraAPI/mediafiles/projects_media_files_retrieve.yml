  method: GET
  url: "{{baseUrl}}/api/v1/projects/:project_pk/media-files/:id/"
  params:
    - name: id
      value: ""
      type: path
      description: Un Cadena UUID que identifique este media file.
    - name: project_pk
      value: ""
      type: path
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/v1/projects/:project_pk/media-files/:id/"
      method: GET
      params:
        - name: id
          value: ""
          type: path
          description: Un Cadena UUID que identifique este media file.
        - name: project_pk
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "file": "",
            "file_type": "image",
            "original_name": "",
            "size": 0,
            "mime_type": "",
            "description": "",
            "progress_entry": "",
            "expense": "",
            "incident": "",
            "incident_followup": "",
            "uploaded_by": "",
            "created": "",
            "modified": ""
          }

docs: |-
  CRUD for media files scoped to a project.

  A MediaFile can be attached to one of four entities:
      - progress_entry: evidence of a progress update
      - expense: receipt or invoice for a cost
      - incident: photo/doc of an incident
      - incident_followup: follow-up evidence

  If ALL four FKs are null, the file is a **project document**  accessible via the
  dedicated /documents/ endpoint.

  Permissions:
      - List/Retrieve: any active project participant
      - Create/Update/Delete: OWNER or COLLABORATOR

  Filters (query params):
      - file_type: filter by type (image, document, etc.)
      - progress_entry: UUID — files for a specific progress entry
      - expense: UUID — files for a specific expense
      - incident: UUID — files for a specific incident
      - incident_followup: UUID — files for a specific follow-up
      - exclude: UUID — exclude a specific file by ID

  File metadata (original_name, size, mime_type) is auto-populated
  on create/update from the uploaded file.
