docs: |-
  Expense tracking with project-scoped categories.
  Linked to ProgressEntry, Supplier, and ExpenseCategory.
  Default categories seeded on project creation: Materials, Labor, Equipment, Permits, Transportation, Miscellaneous.
  VIEWER/CLIENT filter by visible_to_client=true.
  Includes global list and monthly stats across all user's projects.
